services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ttgk
      POSTGRES_PASSWORD: ttgk_local
      POSTGRES_DB: ttgk_dev
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttgk -d ttgk_dev"]
      interval: 3s
      timeout: 5s
      retries: 10
