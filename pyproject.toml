[project]
name = "keep-lines-to-keep"
version = "0.1.0"
description = "Import each line of a text file as a separate Google Keep note"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "gkeepapi>=0.17.0",
    "click>=8.0",
    "keyring>=25.0",
]

[project.scripts]
keep-lines = "keep_lines_to_keep.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["keep_lines_to_keep"]
